<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060A12"/>
      <stop offset="100%" style="stop-color:#0D1526"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0066AA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#CC4400;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF94;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00AA66;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="url(#bg)"/>
  <rect width="1000" height="620" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M0 40 L0 0 L40 0" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <path d="M960 0 L1000 0 L1000 40" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <path d="M0 580 L0 620 L40 620" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <path d="M960 620 L1000 620 L1000 580" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>

  <!-- Header -->
  <text x="500" y="38" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(0,212,255,0.4)" letter-spacing="4">// SYSTEM ARCHITECTURE · DEVFLOW AI v1.0</text>
  <text x="500" y="65" text-anchor="middle" font-family="monospace" font-size="22" font-weight="900" fill="#00D4FF" filter="url(#glow-cyan)" letter-spacing="3">COGNITIVE CONTEXT ENGINE</text>
  <line x1="200" y1="78" x2="800" y2="78" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>

  <!-- ═══ INPUT LAYER ═══ -->
  <!-- Code Input Box -->
  <rect x="40" y="105" width="200" height="100" rx="8" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <text x="140" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" letter-spacing="2">◈ CODE INPUT</text>
  <text x="140" y="150" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#E2F4FF">Paste Code</text>
  <text x="140" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748B">Any language</text>
  <text x="140" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748B">Any codebase</text>

  <!-- Intent Input Box -->
  <rect x="40" y="220" width="200" height="100" rx="8" fill="rgba(255,107,53,0.05)" stroke="rgba(255,107,53,0.3)" stroke-width="1.5"/>
  <text x="140" y="243" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF6B35" letter-spacing="2">◇ INTENT NOTE</text>
  <text x="140" y="265" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#E2F4FF">Last Intent</text>
  <text x="140" y="283" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748B">Natural language</text>
  <text x="140" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748B">What you were doing</text>

  <!-- Arrow from inputs to pipeline -->
  <path d="M240 155 L310 155 L310 270 L350 270" stroke="rgba(0,212,255,0.4)" stroke-width="1.5" fill="none" marker-end="url(#arrowCyan)"/>
  <path d="M240 270 L350 270" stroke="rgba(255,107,53,0.4)" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- ═══ PIPELINE / COGNITIVE CONTEXT GRAPH ═══ -->
  <rect x="350" y="100" width="240" height="370" rx="10" fill="rgba(0,10,25,0.8)" stroke="rgba(0,212,255,0.2)" stroke-width="1.5"/>
  <rect x="350" y="100" width="240" height="36" rx="10" fill="rgba(0,212,255,0.08)"/>
  <rect x="350" y="118" width="240" height="18" fill="rgba(0,212,255,0.08)"/>
  <text x="470" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" letter-spacing="2">COGNITIVE CONTEXT GRAPH</text>

  <!-- Stage 1 -->
  <rect x="368" y="150" width="204" height="48" rx="6" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <circle cx="390" cy="174" r="12" fill="rgba(0,212,255,0.15)" stroke="#00D4FF" stroke-width="1"/>
  <text x="390" y="178" text-anchor="middle" font-family="monospace" font-size="10" fill="#00D4FF" font-weight="700">1</text>
  <text x="412" y="170" font-family="monospace" font-size="11" font-weight="700" fill="#E2F4FF">AST Parsing</text>
  <text x="412" y="185" font-family="monospace" font-size="9" fill="#64748B">Syntax tree · Functions · Deps</text>

  <!-- Stage 2 -->
  <rect x="368" y="208" width="204" height="48" rx="6" fill="rgba(0,255,148,0.04)" stroke="rgba(0,255,148,0.15)" stroke-width="1"/>
  <circle cx="390" cy="232" r="12" fill="rgba(0,255,148,0.1)" stroke="#00FF94" stroke-width="1"/>
  <text x="390" y="236" text-anchor="middle" font-family="monospace" font-size="10" fill="#00FF94" font-weight="700">2</text>
  <text x="412" y="228" font-family="monospace" font-size="11" font-weight="700" fill="#E2F4FF">Semantic Chunking</text>
  <text x="412" y="243" font-family="monospace" font-size="9" fill="#64748B">Cognitive units · Boundaries</text>

  <!-- Stage 3 -->
  <rect x="368" y="266" width="204" height="48" rx="6" fill="rgba(255,107,53,0.04)" stroke="rgba(255,107,53,0.15)" stroke-width="1"/>
  <circle cx="390" cy="290" r="12" fill="rgba(255,107,53,0.1)" stroke="#FF6B35" stroke-width="1"/>
  <text x="390" y="294" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF6B35" font-weight="700">3</text>
  <text x="412" y="286" font-family="monospace" font-size="11" font-weight="700" fill="#E2F4FF">Context Scoring</text>
  <text x="412" y="301" font-family="monospace" font-size="9" fill="#64748B">Recency · Complexity · Weight</text>

  <!-- Stage 4 -->
  <rect x="368" y="324" width="204" height="48" rx="6" fill="rgba(168,85,247,0.04)" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <circle cx="390" cy="348" r="12" fill="rgba(168,85,247,0.1)" stroke="#A855F7" stroke-width="1"/>
  <text x="390" y="352" text-anchor="middle" font-family="monospace" font-size="10" fill="#A855F7" font-weight="700">4</text>
  <text x="412" y="344" font-family="monospace" font-size="11" font-weight="700" fill="#E2F4FF">Intent Inference</text>
  <text x="412" y="359" font-family="monospace" font-size="9" fill="#64748B">NL → Code semantic match</text>

  <!-- Stage 5 -->
  <rect x="368" y="382" width="204" height="48" rx="6" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <circle cx="390" cy="406" r="12" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1"/>
  <text x="390" y="410" text-anchor="middle" font-family="monospace" font-size="10" fill="#F59E0B" font-weight="700">5</text>
  <text x="412" y="402" font-family="monospace" font-size="11" font-weight="700" fill="#E2F4FF">Briefing Generation</text>
  <text x="412" y="417" font-family="monospace" font-size="9" fill="#64748B">Structured JSON output</text>

  <!-- Connector lines between stages -->
  <line x1="470" y1="198" x2="470" y2="208" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="470" y1="256" x2="470" y2="266" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="470" y1="314" x2="470" y2="324" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="470" y1="372" x2="470" y2="382" stroke="rgba(0,212,255,0.2)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ═══ CLAUDE API ═══ -->
  <rect x="420" y="460" width="100" height="50" rx="8" fill="url(#purple)" opacity="0.9"/>
  <text x="470" y="480" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="700" letter-spacing="1">CLAUDE</text>
  <text x="470" y="496" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.7)">Sonnet API</text>
  <line x1="470" y1="430" x2="470" y2="460" stroke="rgba(168,85,247,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow from pipeline to outputs -->
  <path d="M590 270 L650 270" stroke="rgba(0,212,255,0.5)" stroke-width="2" fill="none"/>
  <polygon points="648,265 658,270 648,275" fill="#00D4FF"/>

  <!-- ═══ OUTPUT LAYER ═══ -->

  <!-- Wake-Up Briefing -->
  <rect x="660" y="100" width="180" height="80" rx="8" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.25)" stroke-width="1.5"/>
  <text x="750" y="122" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF" letter-spacing="1">WAKE-UP BRIEFING</text>
  <text x="750" y="142" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Where you stopped</text>
  <text x="750" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">What you were doing</text>
  <text x="750" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Confidence score</text>

  <!-- Next Actions -->
  <rect x="660" y="195" width="180" height="80" rx="8" fill="rgba(0,255,148,0.04)" stroke="rgba(0,255,148,0.2)" stroke-width="1.5"/>
  <text x="750" y="217" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FF94" letter-spacing="1">NEXT ACTIONS</text>
  <text x="750" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Priority task list</text>
  <text x="750" y="253" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Time estimates</text>
  <text x="750" y="269" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">File references</text>

  <!-- Bug Detection -->
  <rect x="660" y="290" width="180" height="80" rx="8" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.2)" stroke-width="1.5"/>
  <text x="750" y="312" text-anchor="middle" font-family="monospace" font-size="9" fill="#EF4444" letter-spacing="1">BUG DETECTION</text>
  <text x="750" y="332" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Severity levels</text>
  <text x="750" y="348" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Fix suggestions</text>
  <text x="750" y="364" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Location mapping</text>

  <!-- Intent Map -->
  <rect x="660" y="385" width="180" height="80" rx="8" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.2)" stroke-width="1.5"/>
  <text x="750" y="407" text-anchor="middle" font-family="monospace" font-size="9" fill="#F59E0B" letter-spacing="1">INTENT MAP</text>
  <text x="750" y="427" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Function annotations</text>
  <text x="750" y="443" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Relevance scores</text>
  <text x="750" y="459" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Work status</text>

  <!-- Cognitive Load -->
  <rect x="660" y="480" width="180" height="60" rx="8" fill="rgba(168,85,247,0.04)" stroke="rgba(168,85,247,0.2)" stroke-width="1.5"/>
  <text x="750" y="502" text-anchor="middle" font-family="monospace" font-size="9" fill="#A855F7" letter-spacing="1">COGNITIVE LOAD</text>
  <text x="750" y="522" text-anchor="middle" font-family="monospace" font-size="10" fill="#94A3B8">Complexity · Debt · Focus</text>

  <!-- Connecting lines from pipeline to each output -->
  <line x1="650" y1="140" x2="660" y2="140" stroke="rgba(0,212,255,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="650" y1="235" x2="660" y2="235" stroke="rgba(0,255,148,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="650" y1="330" x2="660" y2="330" stroke="rgba(239,68,68,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="650" y1="425" x2="660" y2="425" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="650" y1="510" x2="660" y2="510" stroke="rgba(168,85,247,0.3)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Vertical connector on right side of pipeline -->
  <line x1="650" y1="140" x2="650" y2="510" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>

  <!-- ═══ LABELS ═══ -->
  <text x="140" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(0,212,255,0.4)" letter-spacing="3">INPUT LAYER</text>
  <text x="470" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(0,212,255,0.4)" letter-spacing="3">AI PIPELINE</text>
  <text x="750" y="95" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(0,212,255,0.4)" letter-spacing="3">OUTPUT LAYER</text>

  <!-- Section dividers -->
  <line x1="290" y1="88" x2="290" y2="560" stroke="rgba(0,212,255,0.06)" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="640" y1="88" x2="640" y2="560" stroke="rgba(0,212,255,0.06)" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- ═══ TECH BADGES ═══ -->
  <rect x="40" y="560" width="920" height="1" fill="rgba(0,212,255,0.1)"/>
  <text x="50" y="582" font-family="monospace" font-size="9" fill="rgba(0,212,255,0.3)" letter-spacing="1">STACK:</text>
  
  <!-- Tech tags -->
  <rect x="100" y="570" width="80" height="22" rx="4" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="140" y="585" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF">React + Vite</text>

  <rect x="190" y="570" width="90" height="22" rx="4" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="235" y="585" text-anchor="middle" font-family="monospace" font-size="9" fill="#A855F7">Claude API</text>

  <rect x="290" y="570" width="110" height="22" rx="4" fill="rgba(0,255,148,0.06)" stroke="rgba(0,255,148,0.2)" stroke-width="1"/>
  <text x="345" y="585" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FF94">Prompt Chaining</text>

  <rect x="410" y="570" width="90" height="22" rx="4" fill="rgba(255,107,53,0.06)" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>
  <text x="455" y="585" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF6B35">AST Parsing</text>

  <rect x="510" y="570" width="100" height="22" rx="4" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="560" y="585" text-anchor="middle" font-family="monospace" font-size="9" fill="#F59E0B">JSON Schema</text>

  <rect x="620" y="570" width="110" height="22" rx="4" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="675" y="585" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF">Semantic Search</text>

  <text x="960" y="585" text-anchor="end" font-family="monospace" font-size="9" fill="rgba(0,212,255,0.2)" letter-spacing="1">DEVFLOW AI · HACKATHON BUILD</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00D4FF" opacity="0.6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF6B35" opacity="0.6"/>
    </marker>
  </defs>
</svg>
